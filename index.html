: "易被亲友打动者", "subtitle": "孕期偏方与禁忌的常驻听众", "description": "孕期最容易被亲友意见包围。每个建议先问产科医生再决定,是你最安全的过滤器。", "id": "pregnancy-15", "code": "P15", "group_slug": "pregnancy", "group_label": "孕育人群", "group_color": "#B86F73", "level_slug": "aware", "dim_slug": "judge", "image": "assets/images/pregnancy-15.png", "page": "cards/pregnancy-15.html"}, {"group": "孕育人群", "level": "入门", "dim": "会买", "title": "孕期采购新探索", "subtitle": "从一份「孕期食物风险清单」开始", "description": "孕期采购需要一份具体清单。可在中国营养学会、CDC 网站找权威版本,贴在冰箱上。", "id": "pregnancy-16", "code": "P16", "group_slug": "pregnancy", "group_label": "孕育人群", "group_color": "#B86F73", "level_slug": "starter", "dim_slug": "buy", "image": "assets/images/pregnancy-16.png", "page": "cards/pregnancy-16.html"}, {"group": "孕育人群", "level": "入门", "dim": "会存", "title": "孕期厨房新手", "subtitle": "从一个温度计开始", "description": "买一个冰箱温度计(几十元),确保 < 4℃。这一个工具,就能守住李斯特菌的第一道防线。", "id": "pregnancy-17", "code": "P17", "group_slug": "pregnancy", "group_label": "孕育人群", "group_color": "#B86F73", "level_slug": "starter", "dim_slug": "store", "image": "assets/images/pregnancy-17.png", "page": "cards/pregnancy-17.html"}, {"group": "孕育人群", "level": "入门", "dim": "会做", "title": "孕期烹调新手", "subtitle": "从「中心温度 75℃」开始", "description": "买一支食品温度计,肉蛋贝都测一下中心温度——这是孕期最值得投资的厨房工具。", "id": "pregnancy-18", "code": "P18", "group_slug": "pregnancy", "group_label": "孕育人群", "group_color": "#B86F73", "level_slug": "starter", "dim_slug": "cook", "image": "assets/images/pregnancy-18.png", "page": "cards/pregnancy-18.html"}, {"group": "孕育人群", "level": "入门", "dim": "会吃", "title": "孕期营养新探索", "subtitle": "从「每天 400μg 叶酸」开始", "description": "孕前 3 个月起每日 400μg 叶酸,是孕期最有循证依据的营养干预——比任何补品都重要。", "id": "pregnancy-19", "code": "P19", "group_slug": "pregnancy", "group_label": "孕育人群", "group_color": "#B86F73", "level_slug": "starter", "dim_slug": "eat", "image": "assets/images/pregnancy-19.png", "page": "cards/pregnancy-19.html"}, {"group": "孕育人群", "level": "入门", "dim": "会判断", "title": "判断力的起步", "subtitle": "从「先问产科」开始", "descripti e": "K05", "group_slug": "children", "group_label": "青少年与儿童", "group_color": "#F7C600", "level_slug": "excellent", "dim_slug": "judge", "image": "assets/images/children-05.png", "page": "cards/children-05.html"}, {"group": "青少年与儿童", "level": "良好", "dim": "会买", "title": "进步中的小消费者", "subtitle": "选品意识有了,标签可看更细", "description": "你已经知道选牛奶比奶茶健康,但「半糖」「100% 果汁」这些陷阱还需识别。", "id": "children-06", "code": "K06", "group_slug": "children", "group_label": "青少年与儿童", "group_color": "#F7C600", "level_slug": "good", "dim_slug": "buy", "image": "assets/images/children-06.png", "page": "cards/children-06.html"}, {"group": "青少年与儿童", "level": "良好", "dim": "会存", "title": "稳健的食物管家", "subtitle": "意识对了,执行更细致", "description": "你大致知道食物保鲜要点,接下来是在带饭、剩牛奶这些细节上做对每一次。", "id": "children-07", "code": "K07", "group_slug": "children", "group_label": "青少年与儿童", "group_color": "#F7C600", "level_slug": "good", "dim_slug": "store", "image": "assets/images/children-07.png", "page": "cards/children-07.html"}, {"group": "青少年与儿童", "level": "良好", "dim": "会做", "title": "成长中的小厨师", "subtitle": "动手意愿强,卫生习惯再加深", "description": "你愿意自己做食物,这本身就难得。补上「洗手 20 秒、生熟分开」两件事,就跨过最关键的门槛。", "id": "children-08", "code": "K08", "group_slug": "children", "group_label": "青少年与儿童", "group_color": "#F7C600", "level_slug": "good", "dim_slug": "cook", "image": "assets/images/children-08.png", "page": "cards/children-08.html"}, {"group": "青少年与儿童", "level": "良好", "dim": "会吃", "title": "饮食稳定者", "subtitle": "三餐对了,饮料是隐藏短板", "description": "你的早餐与正餐基本到位,但含糖饮料的次数可能比想象中多。本周试着减半。", "id": "children-09", "code": "K09", "group_slug": "children", "group_label": "青少年与儿童", "group_color": "#F7C600", "level_slug": "good", "dim_slug": "eat", "image": "assets/images/children-09.png", "page": "cards/children-09.html"}, {"group": "青少年与儿童", "level": "良好", "dim": "会判断", "title": "保持警觉的小用户", "subtitle": "大多怀疑,偶尔会动心", "description": "你大体能识破网红减肥与长高神药,但同学推荐还是会动摇——下次先和家长说一声。", "id": "children-10", "code": "K10", "group_slug": "children", "group_label": "青少年与儿童", "group_co
